<!DOCTYPE html>
<html>
<head>

    <title>Chess World</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">

    <style>

        body {
            font-family: Arial;
            background: linear-gradient(135deg,#4caf50,#2e7d32);
            text-align: center;
            color: white;
        }

        #board {
            width: 420px;
            margin: auto;
            box-shadow: 0 0 20px black;
            border-radius: 10px;
        }

        button {
            padding: 12px 20px;
            margin: 10px;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: #ffcc00;
            transition: 0.3s;
        }

            button:hover {
                transform: scale(1.1);
                background: #ffd633;
            }
    </style>
</head>

<body>

    <h1>Chess World</h1>

    <div id="board"></div>

    <button onclick="saveGame()">Save Game</button>
    <button onclick="loadGame()">Load Game</button>
    <button onclick="resetGame()">Reset</button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/stockfish/stockfish.js"></script>

    <script>

var game = new Chess()

var board = Chessboard('board',{
draggable:true,
position:'start',
onDrop:onDrop,
moveSpeed:200
})

var engine = STOCKFISH()

function onDrop(source,target){

var move = game.move({
from:source,
to:target,
promotion:'q'
})

if(move === null) return 'snapback'

board.position(game.fen())

makeAIMove()

}

function makeAIMove(){

engine.postMessage("position fen "+game.fen())

engine.postMessage("go depth 12")

engine.onmessage=function(event){

if(event.data.startsWith("bestmove")){

var move = event.data.split(" ")[1]

game.move({
from:move.substring(0,2),
to:move.substring(2,4),
promotion:'q'
})

board.position(game.fen())

}

}

}

function saveGame(){

localStorage.setItem("savedChess",game.fen())

alert("Game Saved")

}

function loadGame(){

var fen = localStorage.getItem("savedChess")

if(fen){

game.load(fen)

board.position(fen)

}

}

function resetGame(){

game.reset()

board.start()

}

    </script>

</body>
</html>
