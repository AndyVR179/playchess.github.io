<!DOCTYPE html>
<html>
<head>
<title>MathForge</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="login">

<h1>MathForge</h1>

<select id="role">
<option value="student">Student</option>
<option value="teacher">Teacher</option>
</select>

<input id="user" placeholder="Username">

<button onclick="login()">Login</button>

</div>

<div id="app" class="hidden">

<div class="sidebar">

<h2 id="roleTitle"></h2>

<button onclick="show('skills')">Skills</button>
<button onclick="show('practice')">Practice</button>
<button onclick="show('graph')">Graph</button>
<button onclick="show('progress')">Progress</button>
<button onclick="logout()">Logout</button>

</div>

<div class="main">

<div id="skills">

<h2>Skill Tree</h2>

<div class="skill">
Linear Equations
<button onclick="startSkill('linear')">Practice</button>
</div>

<div class="skill">
Addition
<button onclick="startSkill('addition')">Practice</button>
</div>

<div class="skill">
Multiplication
<button onclick="startSkill('multiply')">Practice</button>
</div>

</div>

<div id="practice" class="hidden">

<h2>Practice</h2>

<div id="problemBox">

<p id="problem"></p>

<input id="answer">

<button onclick="submitAnswer()">Submit</button>

<p id="feedback"></p>

</div>

</div>

<div id="graph" class="hidden">

<h2>Graph Tool</h2>

<input id="equation" placeholder="y = x + 2">

<button onclick="drawGraph()">Graph</button>

<canvas id="graphCanvas" width="400" height="300"></canvas>

</div>

<div id="progress" class="hidden">

<h2>Progress</h2>

<div id="stats"></div>

</div>

</div>
</div>

<script src="problems.js"></script>
<script src="graph.js"></script>
<script src="app.js"></script>

</body>
</html>
